name: CI

on:
  push:
    branches: [main, dev]
    paths:
      - '**/*.py'
      - 'requirements*.txt'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
      - 'requirements*.txt'

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Ruff check
        run: |
          . .venv/bin/activate
          pip install ruff
          ruff check . --exclude .venv --exclude references
      - name: Pytest
        run: |
          . .venv/bin/activate
          python -m pytest tests/ -q
